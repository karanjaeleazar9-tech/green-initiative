<main>
    <h2>Donate</h2>
    <p>Your support helps us plant trees, run workshops, and clean communities. Every contribution counts!</p>

    <form action="thankyou.html" method="post">
        <label for="donorName">Full Name:</label><br>
        <input type="text" id="donorName" name="donorName" required><br><br>

        <label for="donorEmail">Email Address:</label><br>
        <input type="email" id="donorEmail" name="donorEmail" required><br><br>

        <label for="donorPhone">Phone Number:</label><br>
        <input type="tel" id="donorPhone" name="donorPhone"><br><br>

        <label for="amount">Donation Amount (USD):</label><br>
        <input type="number" id="amount" name="amount" required><br><br>

        <label for="paymentMethod">Payment Method:</label><br>
        <select id="paymentMethod" name="paymentMethod" required>
            <option value="">Select</option>
            <option value="mpesa">M-Pesa</option>
            <option value="paypal">PayPal</option>
            <option value="bank">Bank Transfer</option>
        </select><br><br>

        <label for="message">Message (optional):</label><br>
        <textarea id="message" name="message" rows="4"></textarea><br><br>

        <button type="submit" class="btn">Donate Now</button>
    </form>
</main>
