<body>

<header>
    <div class="banner">
        <h1>Green Initiative</h1>
        <p>Join us and make an impact</p>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a>
                <ul class="dropdown">
                    <li><a href="projects.html">Projects</a></li>

            </li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="donate.html">Donate</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Volunteer</h2>
    <p>Join us in making a difference! Fill out the form below and we will contact you.</p>

    <form action="thankyou.html" method="post">
        <label for="volName">Full Name:</label><br>
        <input type="text" id="volName" name="volName" required><br><br>

        <label for="volEmail">Email Address:</label><br>
        <input type="email" id="volEmail" name="volEmail" required><br><br>

        <label for="volPhone">Phone Number:</label><br>
        <input type="tel" id="volPhone" name="volPhone" required><br><br>

        <label for="interest">Areas of Interest:</label><br>
        <select id="interest" name="interest" required>
            <option value="">Select</option>
            <option value="treePlanting">Tree Planting</option>
            <option value="cleanups">Community Cleanups</option>
            <option value="workshops">Workshops</option>
            <option value="admin">Admin Support</option>
        </select><br><br>

        <label for="availability">Availability (Days/Times):</label><br>
        <input type="text" id="availability" name="availability" required><br><br>

        <label for="volMessage">Message (optional):</label><br>
        <textarea id="volMessage" name="volMessage" rows="4"></textarea><br><br>

        <button type="submit" class="btn">Sign Up to Volunteer</button>
    </form>
</main>

<footer>

</body>
